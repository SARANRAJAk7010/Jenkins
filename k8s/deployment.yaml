apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pyapp
  template:
    metadata:
      labels:
        app: pyapp
    spec:
      containers:
        - name: pyapp
          image: pyapp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000

